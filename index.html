<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="Damián Rincón Cañaveral, Desarrollador de software movíl y web, Freelance, Ingeniero en Tecnologias de la Información.">
    <meta name="keywords" content="Desarrollador de Software, software, android, web, movíl." />
    <meta name="author" content="Damián Rincón Cañaveral" />
    <title>Damián Rincón Cañaveral</title>
    <link href='https://fonts.googleapis.com/css?family=Product+Sans' rel='stylesheet' type='text/css'>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
	<link rel="stylesheet" href="https://code.getmdl.io/1.3.0/material.teal-orange.min.css"/>
	<script defer src="https://code.getmdl.io/1.3.0/material.min.js"></script>

	<style type="text/css" media="screen">
		* { font-family: Product Sans; }
		.demo-layout-waterfall .mdl-layout__header-row .mdl-navigation__link:last-of-type  {
			padding-right: 0;
		}
		.drc-badge{ color: #FFFFFF !important; }
	</style>
</head>
<body>
	<div class="demo-layout-waterfall mdl-layout mdl-js-layout">
		<header class="mdl-layout__header mdl-layout__header--waterfall">
	    	<!-- Top row, always visible -->
	    	<div class="mdl-layout__header-row">
	      		<!-- Title -->
	      		<span class="mdl-layout-title">Damián Rincón</span>
	      		<div class="mdl-layout-spacer"></div>
	      		<div class="mdl-textfield mdl-js-textfield mdl-textfield--expandable
	                  mdl-textfield--floating-label mdl-textfield--align-right">
	        		<label class="mdl-button mdl-js-button mdl-button--icon" for="waterfall-exp">
	          			<i class="material-icons">search</i>
	        		</label>
	        		<div class="mdl-textfield__expandable-holder">
	          			<input class="mdl-textfield__input" type="text" name="sample" id="waterfall-exp">
	        		</div>
	      		</div>
	    	</div>
	    	<!-- Bottom row, not visible on scroll -->
	    	<div class="mdl-layout__header-row">
	      		<div class="mdl-layout-spacer"></div>
	      		<!-- Navigation -->
	      		<nav class="mdl-navigation">
	        		<a id="redes" class="mdl-navigation__link" href="#"><span class="mdl-badge" data-badge="5">Redes Sociales</span></a>
	        		<a class="mdl-navigation__link" href="#"><span class="mdl-badge" data-badge="4">Portafolio</span></a>
	      		</nav>
	      		<ul class="mdl-menu mdl-menu--bottom-left mdl-js-menu mdl-js-ripple-effect" for="redes">
  					<li class="mdl-menu__item">Facebook</li>
  					<li class="mdl-menu__item">Instagram</li>
  					<li class="mdl-menu__item">Skype</li>
  					<li class="mdl-menu__item">Gmail</li>
  					<li disabled class="mdl-menu__item">GitHub</li>
				</ul>
	    	</div>
  		</header>
  		<div class="mdl-layout__drawer">
    		<span class="mdl-layout-title">Damián Rincón</span>
    		<nav class="mdl-navigation">
      			<a class="mdl-navigation__link" href="#">Link</a>
      			<a class="mdl-navigation__link" href="#">Link</a>
      			<a class="mdl-navigation__link" href="#">Link</a>
    		</nav>
  		</div>
  		<main class="mdl-layout__content">
    		<div class="page-content"><!-- Your content goes here --></div>
  		</main>
	</div>
	<script type="text/javascript" src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
</body>
</html>
